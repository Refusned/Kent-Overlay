name: Static Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run static tests
        run: bash tests/run-all.sh static
      - name: Run deploy tests
        run: bash tests/run-all.sh deploy
