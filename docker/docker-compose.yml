version: "3.8"

services:
  openclaw:
    image: openclaw/openclaw:latest
    container_name: kent-openclaw
    restart: unless-stopped
    ports:
      - "127.0.0.1:18789:18789"    # Gateway — ONLY localhost
    volumes:
      - openclaw-config:/root/.openclaw
      - ./workspace:/root/.openclaw/workspace
    env_file:
      - ../.env
    environment:
      - OPENCLAW_DISABLE_BONJOUR=1
      - NODE_ENV=production
    mem_limit: 2g
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  browser:
    image: openclaw/browser:latest
    container_name: kent-browser
    restart: unless-stopped
    shm_size: "2g"
    tmpfs:
      - /dev/shm:size=2g
    mem_limit: 2g
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

volumes:
  openclaw-config:
    driver: local

networks:
  internal:
    driver: bridge
