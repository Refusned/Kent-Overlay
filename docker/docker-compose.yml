version: "3.8"

services:
  openclaw:
    image: openclaw/openclaw:latest
    container_name: kent-openclaw
    restart: unless-stopped
    ports:
      - "127.0.0.1:18789:18789"    # Gateway — ONLY localhost
    volumes:
      - openclaw-config:/root/.openclaw
      - ./workspace:/root/.openclaw/workspace
    env_file:
      - ../.env
    environment:
      - OPENCLAW_DISABLE_BONJOUR=1
      - NODE_ENV=production
    mem_limit: 2g
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  browser:
    image: openclaw/browser:latest
    container_name: kent-browser
    restart: unless-stopped
    shm_size: "2g"
    tmpfs:
      - /dev/shm:size=2g
    mem_limit: 2g
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - internal

  postgres:
    # PostgreSQL 16 с pgvector расширением — RAG memory storage
    image: pgvector/pgvector:pg16
    container_name: kent-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"   # Внешний 5433 (5432 может быть занят на хосте) → 5432 в контейнере
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../api/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      - POSTGRES_USER=kent
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-kent_dev_password}
      - POSTGRES_DB=kent
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kent -d kent"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  api:
    # FastAPI gateway — REST API + WebSocket
    build: ../api
    container_name: kent-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"   # Только localhost — публикуй через reverse-proxy если нужно наружу
    volumes:
      # Read-only монтирование workspace и config в /data/* (non-root user не имеет доступа к /root/)
      - ../workspace:/data/workspace:ro
      - ../config:/data/config:ro
    environment:
      - KENT_VERSION=1.0.0
      - KENT_WORKSPACE_PATH=/data/workspace
      - KENT_CONFIG_PATH=/data/config
      - KENT_OPENCLAW_BASE_URL=http://openclaw:18789
      - KENT_BUILD_DATE=2026-04-25
      # Bearer token для защиты endpoints. Если пустой — auth выключена (dev mode).
      # В prod задавай: KENT_API_TOKEN=<длинный-случайный-токен> docker compose up
      - KENT_API_TOKEN=${KENT_API_TOKEN:-}
      - KENT_CORS_ORIGINS=${KENT_CORS_ORIGINS:-*}
      # PostgreSQL для RAG memory storage
      - KENT_DB_HOST=postgres
      - KENT_DB_PORT=5432
      - KENT_DB_USER=kent
      - KENT_DB_PASSWORD=${POSTGRES_PASSWORD:-kent_dev_password}
      - KENT_DB_NAME=kent
      # OpenAI API для embeddings (опционально — без него работает mock embedding)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # YandexGPT — Yandex Cloud Foundation Models
      - YANDEX_API_KEY=${YANDEX_API_KEY:-}
      - YANDEX_FOLDER_ID=${YANDEX_FOLDER_ID:-}
      - YANDEX_MODEL=${YANDEX_MODEL:-yandexgpt-lite}
      # GigaChat от Сбера
      - GIGACHAT_AUTH_KEY=${GIGACHAT_AUTH_KEY:-}
      - GIGACHAT_CLIENT_ID=${GIGACHAT_CLIENT_ID:-}
      - GIGACHAT_CLIENT_SECRET=${GIGACHAT_CLIENT_SECRET:-}
      - GIGACHAT_SCOPE=${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
      - GIGACHAT_MODEL=${GIGACHAT_MODEL:-GigaChat}
    mem_limit: 256m         # FastAPI лёгкий — 256MB хватает с запасом
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  openclaw-config:
    driver: local
  postgres-data:
    driver: local

networks:
  internal:
    driver: bridge
